<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Francis le Coq 🐓</title>
    <link rel="icon" href="assets/sprites/francis.png">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- SPLASH SCREEN -->
    <div id="splash-screen" class="screen active">
        <div class="splash-content">
            <div class="splash-logo">
                <img src="assets/sprites/francis.png" alt="Francis" class="splash-francis">
            </div>
            <h1 class="splash-title">Francis le Coq</h1>
            <p class="splash-sub">Un Tamagotchi 100% Gaulois 🇫🇷</p>
            <button class="btn btn-primary btn-glow" id="btn-start-game">
                <span>Commencer</span>
            </button>
        </div>
    </div>

    <!-- MAIN GAME SCREEN -->
    <div id="game-screen" class="screen">
        <!-- Top HUD -->
        <div class="hud-top">
            <div class="hud-name" id="hud-name">Francis</div>
            <div class="hud-stage" id="hud-stage">🐣 Poussin</div>
            <div class="hud-icons">
                <button class="hud-btn" id="btn-alert" title="Alertes">
                    <span class="icon">🔔</span>
                    <span class="alert-dot hidden" id="alert-dot"></span>
                </button>
            </div>
        </div>

        <!-- Stats Bar -->
        <div class="stats-bar">
            <div class="stat-item" data-stat="faim">
                <span class="stat-icon">🌾</span>
                <div class="stat-track"><div class="stat-fill" id="stat-faim"></div></div>
            </div>
            <div class="stat-item" data-stat="bonheur">
                <span class="stat-icon">😊</span>
                <div class="stat-track"><div class="stat-fill" id="stat-bonheur"></div></div>
            </div>
            <div class="stat-item" data-stat="energie">
                <span class="stat-icon">⚡</span>
                <div class="stat-track"><div class="stat-fill" id="stat-energie"></div></div>
            </div>
            <div class="stat-item" data-stat="sante">
                <span class="stat-icon">❤️</span>
                <div class="stat-track"><div class="stat-fill" id="stat-sante"></div></div>
            </div>
        </div>

        <!-- Main Scene -->
        <div class="scene-container">
            <div class="scene" id="scene">
                <!-- Background layers -->
                <div class="scene-bg" id="scene-bg"></div>
                <div class="scene-fg" id="scene-fg"></div>
                
                <!-- Pet container -->
                <div class="pet-wrapper" id="pet-wrapper">
                    <div class="pet" id="pet">
                        <img src="assets/sprites/poussin.svg" alt="Francis" id="pet-sprite" draggable="false">
                    </div>
                    <!-- Emotion bubble -->
                    <div class="emotion-bubble hidden" id="emotion-bubble">
                        <span id="emotion-icon">💕</span>
                    </div>
                    <!-- Speech bubble -->
                    <div class="speech-bubble hidden" id="speech-bubble">
                        <span id="speech-text"></span>
                    </div>
                </div>

                <!-- Floating items (food, poop, etc) -->
                <div class="scene-items" id="scene-items"></div>

                <!-- Poop indicators -->
                <div class="poop-container" id="poop-container"></div>

                <!-- Touch overlay for petting -->
                <div class="scene-touch" id="scene-touch"></div>

                <!-- Day/night overlay -->
                <div class="scene-overlay" id="scene-overlay"></div>
            </div>
        </div>

        <!-- Action Bar -->
        <div class="action-bar" id="action-bar">
            <button class="action-btn" data-action="nourrir" id="btn-nourrir">
                <span class="action-icon">🍽️</span>
                <span class="action-label">Nourrir</span>
            </button>
            <button class="action-btn" data-action="jouer" id="btn-jouer">
                <span class="action-icon">🎮</span>
                <span class="action-label">Jouer</span>
            </button>
            <button class="action-btn" data-action="dormir" id="btn-dormir">
                <span class="action-icon">💤</span>
                <span class="action-label">Dormir</span>
            </button>
            <button class="action-btn" data-action="soigner" id="btn-soigner">
                <span class="action-icon">💊</span>
                <span class="action-label">Soigner</span>
            </button>
            <button class="action-btn" data-action="nettoyer" id="btn-nettoyer">
                <span class="action-icon">🧹</span>
                <span class="action-label">Nettoyer</span>
            </button>
            <button class="action-btn" data-action="stats" id="btn-stats">
                <span class="action-icon">📊</span>
                <span class="action-label">Stats</span>
            </button>
        </div>
    </div>

    <!-- FOOD SELECTION OVERLAY -->
    <div id="food-screen" class="overlay hidden">
        <div class="overlay-panel">
            <div class="overlay-header">
                <h2>Nourrir Francis</h2>
                <button class="close-btn" data-close="food-screen">✕</button>
            </div>
            <div class="food-grid" id="food-grid"></div>
        </div>
    </div>

    <!-- STATS OVERLAY -->
    <div id="stats-screen" class="overlay hidden">
        <div class="overlay-panel overlay-panel-full">
            <div class="overlay-header">
                <h2>Statistiques</h2>
                <button class="close-btn" data-close="stats-screen">✕</button>
            </div>
            <div class="stats-detail" id="stats-detail"></div>
        </div>
    </div>

    <!-- MINIGAME OVERLAY -->
    <div id="minigame-screen" class="overlay hidden">
        <div class="overlay-panel overlay-panel-full">
            <div class="overlay-header">
                <h2 id="minigame-title">Mini-jeu</h2>
                <button class="close-btn" data-close="minigame-screen">✕</button>
            </div>
            <div class="minigame-area" id="minigame-area"></div>
        </div>
    </div>

    <!-- EVOLUTION OVERLAY -->
    <div id="evolution-screen" class="overlay hidden">
        <div class="evolution-content">
            <div class="evo-particles" id="evo-particles"></div>
            <h2 class="evo-title">✨ Évolution ! ✨</h2>
            <div class="evo-stages">
                <div class="evo-old" id="evo-old"></div>
                <div class="evo-arrow">→</div>
                <div class="evo-new" id="evo-new"></div>
            </div>
            <p class="evo-desc" id="evo-desc"></p>
            <button class="btn btn-primary" id="btn-evo-ok">Cocorico !</button>
        </div>
    </div>

    <!-- DEATH SCREEN -->
    <div id="death-screen" class="overlay hidden">
        <div class="death-content">
            <div class="death-icon">😇</div>
            <h2 class="death-title">Francis est parti...</h2>
            <p class="death-desc" id="death-desc"></p>
            <div class="death-stats" id="death-stats"></div>
            <button class="btn btn-primary" id="btn-restart">Nouvel œuf 🥚</button>
        </div>
    </div>

    <!-- TOAST NOTIFICATION -->
    <div class="toast hidden" id="toast">
        <span id="toast-text"></span>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/minigames.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
